<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Cream background -->
  <rect width="64" height="64" fill="#fdf6e3"/>

  <!-- Bold ink book block (thick border reads at 16px) -->
  <rect x="8" y="12" width="48" height="40" fill="#2d2d2d"/>

  <!-- Left page (white) -->
  <rect x="12" y="16" width="18" height="32" fill="#ffffff"/>
  <!-- Right page (white) -->
  <rect x="34" y="16" width="18" height="32" fill="#ffffff"/>

  <!-- Bold brand-color page lines (chunky, high contrast) -->
  <rect x="15" y="21" width="12" height="3" fill="#ff6b9d"/>
  <rect x="15" y="28" width="12" height="3" fill="#ffd700"/>
  <rect x="15" y="35" width="12" height="3" fill="#60a5fa"/>

  <rect x="37" y="21" width="12" height="3" fill="#7c5cff"/>
  <rect x="37" y="28" width="12" height="3" fill="#4ade80"/>
  <rect x="37" y="35" width="12" height="3" fill="#ff6b9d"/>
</svg>
